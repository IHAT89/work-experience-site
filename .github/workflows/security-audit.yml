---
# Work Experience Site — Scheduled Security Audit
name: Scheduled Security Audit

"on":
  schedule:
    - cron: 0 23 * * 0  # Every Monday 07:00 SGT (Sunday 23:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  audit-and-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        run: |
          if npm audit 2>&1 | tail -1 | grep -q 'found 0 vulnerabilities'; then
            echo "clean=true" >> "$GITHUB_OUTPUT"
            echo "No vulnerabilities found"
          else
            echo "clean=false" >> "$GITHUB_OUTPUT"
            echo "Vulnerabilities detected"
          fi

      - name: Apply safe fixes
        if: steps.audit.outputs.clean == 'false'
        run: npm audit fix || true

      - name: Check for changes
        if: steps.audit.outputs.clean == 'false'
        id: changes
        run: |
          if git diff --quiet package-lock.json package.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff --stat
          fi

      - name: Verify build
        if: steps.changes.outputs.has_changes == 'true'
        run: npm run build

      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="security/audit-fix-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "fix(deps): automated npm audit fix $(date +%Y-%m-%d)"
          git push --force origin "$BRANCH"
          if gh pr view "$BRANCH" > /dev/null 2>&1; then
            echo "PR already exists for $BRANCH — skipping create"
          else
            gh pr create \
              --title "fix(deps): automated security audit fix -- $(date +%Y-%m-%d)" \
              --body "Automated weekly npm audit fix. Only safe patch-level fixes applied (no --force). Review and merge if CI passes." \
              --label "dependencies,security"
          fi
