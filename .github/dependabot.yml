# Dependabot — GitHub Actions ecosystem only
# npm dependency updates are handled by Renovate Bot (renovate.json)
# which has smarter grouping and vulnerability alert prioritisation.
# Docs: https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # GitHub Actions ecosystem — keep workflow actions up to date
  # (Renovate is disabled for github-actions in renovate.json)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Singapore
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci):"
